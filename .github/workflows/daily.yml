name: daily-score

on:
  schedule:
    # 18:30 UTC = 04:30 Sydney (AEST) / 05:30 (AEDT) — fresh scores before dawn.
    - cron: "30 18 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine deps
        run: pip install -r engine/requirements.txt

      - name: Run engine tests (on sample data)
        run: python engine/tests.py

      - name: Score today (live Open-Meteo)
        run: python engine/run.py --live

      - name: Commit fresh scores
        run: |
          git config user.name "bite-index-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/output web/src/data
          git diff --cached --quiet && echo "no changes" || git commit -m "scores: $(date -u +%F)"
          git push
